event_queues:
  - name: rmq-orders
    type: rabbitmq
    format: yaml
    connection:
      server: ${RMQ_IP}
      port: 5672
      vhost: /
      credentials: RABBITMQ1
    action:
      type: runorder
logging:
  level: INFO
  to_file: false
  filename: consumer.log
controlm:
  aapi: ${CTM_AAPI_ENDPOINT}
  token: CONTROLM_TOKEN
