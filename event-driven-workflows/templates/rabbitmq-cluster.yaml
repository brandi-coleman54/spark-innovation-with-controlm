# rabbitmq-cluster.yaml
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: rabbitmq
  namespace: messaging
spec:
  replicas: 1

  # Resource allocation
  resources:
    requests:
      cpu: 500m
      memory: 250Mi
    limits:
      cpu: 2
      memory: 1Gi

  # Persistence configuration
  persistence:
    storageClassName: local-path  # Use your storage class
    storage: 3Gi

  # RabbitMQ configuration
  rabbitmq:
    additionalConfig: |
      cluster_partition_handling = pause_minority
      vm_memory_high_watermark.relative = 0.7
      disk_free_limit.absolute = 2GB
      collect_statistics_interval = 10000

  # Enable management plugin
  rabbitmq:
    additionalPlugins:
      - rabbitmq_management
      - rabbitmq_prometheus
      - rabbitmq_shovel
      - rabbitmq_shovel_management

  # Service configuration
  #service:
  #  type: NodePort

  # Affinity rules for high availability
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: rabbitmq
          topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-external
  namespace: messaging  # Ensure this matches your RabbitMQ namespace
spec:
  type: NodePort
  selector:
    # This label must match the labels on your RabbitMQ pods
    # If using the Operator, it's usually: app.kubernetes.io/name: <cluster-name>
    app.kubernetes.io/name: rabbitmq
  ports:
    - name: management
      protocol: TCP
      port: 15672        # Internal ClusterIP port
      targetPort: 15672  # Port the RabbitMQ container listens on
      nodePort: 31928    # <--- External port for UI (must be 30000-32767)
